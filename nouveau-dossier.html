<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justice AI - Assistant juridique</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
            border-left: 4px solid #27ae60;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .loading { text-align: center; padding: 20px; color: #667eea; }
        .disclaimer { font-size: 12px; color: #999; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚖️ Justice AI Canada</h1>
            <p>Assistant juridique gratuit - Alimenté par Llama 3 (local)</p>
        </div>
        <div class="body">
            <form id="justiceForm">
                <div class="form-group">
                    <label>Province</label>
                    <select id="province" required>
                        <option value="">Sélectionnez</option>
                        <option>Ontario</option>
                        <option>Québec</option>
                        <option>Colombie-Britannique</option>
                        <option>Alberta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type d'accusation</label>
                    <select id="accusation" required>
                        <option value="">Sélectionnez</option>
                        <option>Vol à l'étalage</option>
                        <option>Fraude</option>
                        <option>Agression</option>
                        <option>Menaces</option>
                        <option>Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Décrivez votre situation</label>
                    <textarea id="description" rows="5" placeholder="Décrivez ce qui s'est passé (dates, lieux, témoins..."></textarea>
                </div>
                <button type="submit">📝 Générer mon guide de défense</button>
            </form>
            <div id="result" class="result"></div>
            <div class="disclaimer">⚖️ L'IA ne remplace pas un avocat. Llama 3 tourne localement sur votre ordinateur.</div>
        </div>
    </div>

    <script>
        // Appel à votre backend Llama 3 local
        const API_URL = 'http://localhost:3001/api/generate-guide';
        
        document.getElementById('justiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const province = document.getElementById('province').value;
            const accusation = document.getElementById('accusation').value;
            const description = document.getElementById('description').value;
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">🤖 Llama 3 analyse votre situation...</div>';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ province, accusation, description })
                });
                
                const data = await response.json();
                const guide = data.guide;
                
                // Sauvegarder dans localStorage
                const dossier = {
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    province, accusation, description,
                    guide: guide.substring(0, 500)
                };
                const dossiers = JSON.parse(localStorage.getItem('justice_dossiers') || '[]');
                dossiers.push(dossier);
                localStorage.setItem('justice_dossiers', JSON.stringify(dossiers));
                
                resultDiv.innerHTML = `
                    <h3>✅ Votre guide de défense (généré par Llama 3)</h3>
                    <hr>
                    ${guide.replace(/\n/g, '<br>')}
                    <hr>
                    <button onclick="window.location.href='mes-dossiers.html'" style="margin-top:15px; padding:10px; background:#667eea; color:white; border:none; border-radius:8px; cursor:pointer;">📁 Voir mes dossiers</button>
                `;
            } catch (error) {
                resultDiv.innerHTML = '<p style="color:red;">❌ Erreur : Le serveur Llama 3 n\'est pas démarré.</p><p>Ouvrez un PowerShell et tapez : cd C:\\justice-ai-backend puis npm start</p><p>Assurez-vous aussi que ollama serve tourne dans un autre PowerShell.</p>';
            }
        });
    </script>
</body>
</html>
